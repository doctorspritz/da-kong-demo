name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' || github.event.repository.name == 'kalshi-poly-arb' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt', 'pyproject.toml', '**/pyproject.toml', '**/*.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        if: ${{ hashFiles('Cargo.toml') != '' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install repo dependencies
        shell: bash
        run: |
          set -euo pipefail
          repo_name=$(basename "$GITHUB_WORKSPACE")
          python -m pip install --upgrade pip || true
          case "$repo_name" in
            beads)
              sudo apt-get update
              sudo apt-get install -y libicu-dev
              ;;
            cfo|golf-directory|hg-website)
              npm ci
              ;;
            hg-FiF)
              python -m pip install -r requirements.txt pytest
              ;;
            hg-market-data)
              python -m pip install poetry
              (cd brisbane_prop_updater && poetry install --no-interaction)
              ;;
            slide-doctor)
              python -m pip install -e .
              ;;
            clawstreetbots|supercoach-bot)
              if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
              ;;
          esac

      - name: Hygiene gate
        run: bash scripts/hygiene_check.sh --ci

      - name: Review guard
        run: bash scripts/review_guard.sh --ci

      - name: Validation gate
        run: bash scripts/validate_repo.sh --ci
